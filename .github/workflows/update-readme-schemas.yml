name: Update README and schemas list

on:
  push:
    paths:
      - 'schemas/**/*.json'
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update README with schemas
        run: node .github/scripts/update-readme-schemas.js

      - name: Commit readme
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: README.md
          commit_message: "docs: update schemas list in README"

      - name: Commit $id schemas
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'schemas/*.json'
          commit_message: "schema: update all schemas $id"